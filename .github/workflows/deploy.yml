name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - run: npm install
      - run: npm run build
      
      - name: Verify secrets
        run: |
          if [ -z "$CF_TOKEN" ]; then echo "CF_API_TOKEN is EMPTY"; else echo "CF_API_TOKEN is SET"; fi
          if [ -z "$CF_ACCT" ]; then echo "CF_ACCOUNT_ID is EMPTY"; else echo "CF_ACCOUNT_ID is SET"; fi
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCT: ${{ secrets.CF_ACCOUNT_ID }}
      
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name avion-platform-dashboard --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
